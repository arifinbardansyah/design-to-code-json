<svg width="1920" height="960" viewBox="0 0 1920 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D99FF"/>
      <stop offset="1" stop-color="#5B63E8"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="960" fill="url(#bg)"/>

  <!-- left: copy -->
  <text x="140" y="300" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="6" fill="#FFFFFF" fill-opacity="0.75">FIGMA PLUGIN</text>
  <text x="136" y="416" font-family="Helvetica, Arial, sans-serif" font-size="86" font-weight="700" fill="#FFFFFF">Design to Code JSON</text>
  <text x="140" y="520" font-family="Helvetica, Arial, sans-serif" font-size="44" font-weight="400" fill="#FFFFFF" fill-opacity="0.92">Any selection &#8594; JSON for AI codegen —</text>
  <text x="140" y="580" font-family="Helvetica, Arial, sans-serif" font-size="44" font-weight="400" fill="#FFFFFF" fill-opacity="0.92">real tokens, text styles &amp; components.</text>

  <!-- right: a faux JSON / token card -->
  <g transform="translate(1180,150)">
    <rect width="640" height="660" rx="28" fill="#0B1220" fill-opacity="0.28"/>
    <rect width="640" height="660" rx="28" fill="none" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="2"/>
    <!-- three colored token rows -->
    <g transform="translate(56,90)">
      <circle cx="20" cy="20" r="16" fill="#1CCB5C"/>
      <rect x="56" y="8" width="300" height="24" rx="12" fill="#FFFFFF"/>
      <rect x="380" y="8" width="120" height="24" rx="12" fill="#FFFFFF" fill-opacity="0.45"/>
    </g>
    <g transform="translate(56,180)">
      <circle cx="20" cy="20" r="16" fill="#EA6025"/>
      <rect x="56" y="8" width="240" height="24" rx="12" fill="#FFFFFF" fill-opacity="0.92"/>
      <rect x="320" y="8" width="140" height="24" rx="12" fill="#FFFFFF" fill-opacity="0.4"/>
    </g>
    <g transform="translate(56,270)">
      <circle cx="20" cy="20" r="16" fill="#2E90FA"/>
      <rect x="56" y="8" width="280" height="24" rx="12" fill="#FFFFFF" fill-opacity="0.84"/>
      <rect x="360" y="8" width="100" height="24" rx="12" fill="#FFFFFF" fill-opacity="0.4"/>
    </g>
    <!-- divider -->
    <rect x="56" y="380" width="528" height="2" rx="1" fill="#FFFFFF" fill-opacity="0.2"/>
    <!-- mode chips (light / dark) -->
