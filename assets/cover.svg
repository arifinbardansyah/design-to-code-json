      <rect width="150" height="48" rx="24" fill="#FFFFFF" fill-opacity="0.16"/>
      <circle cx="34" cy="24" r="12" fill="#FFFFFF"/>
      <rect x="186" width="150" height="48" rx="24" fill="#FFFFFF" fill-opacity="0.16"/>
      <circle cx="220" cy="24" r="12" fill="#121926"/>
    </g>
    <!-- alias arrow row -->
    <g transform="translate(56,520)">
      <rect width="200" height="20" rx="10" fill="#FFFFFF" fill-opacity="0.55"/>
      <path d="M222 10 H300" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="3" stroke-linecap="round"/>
      <path d="M292 3 L302 10 L292 17" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <rect x="316" width="220" height="20" rx="10" fill="#1CCB5C" fill-opacity="0.8"/>
