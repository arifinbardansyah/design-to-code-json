<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        font: 12px -apple-system, 'Segoe UI', Roboto, sans-serif;
        margin: 0; padding: 12px; display: flex; flex-direction: column;
        gap: 8px; height: 100vh;
      }
      .row { display: flex; gap: 8px; align-items: center; }
      h1 { font-size: 13px; margin: 0; flex: 1; }
      .hint { color: #888; font-size: 11px; line-height: 1.4; }
      textarea {
        flex: 1; width: 100%; resize: none; font-family: ui-monospace, Menlo, monospace;
        font-size: 11px; line-height: 1.45; padding: 8px; border: 1px solid #ccc;
        border-radius: 6px; white-space: pre; overflow: auto;
      }
      button {
        border: 0; border-radius: 6px; padding: 7px 12px; font-size: 12px;
        font-weight: 600; cursor: pointer;
      }
      .primary { background: #0d99ff; color: #fff; }
      .ghost { background: #e5e5e5; color: #111; }
      #status { color: #2a8c4a; font-size: 11px; min-height: 14px; }
      .opts { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; font-size: 11px; }
      .opts label { display: flex; gap: 4px; align-items: center; cursor: pointer; }
      .opts select { font-size: 11px; padding: 2px 4px; border-radius: 4px; border: 1px solid #ccc; }
    </style>
  </head>
  <body>
    <div class="row">
      <h1>Design Extractor</h1>
      <button class="ghost" id="refresh">Re-read</button>
      <button class="primary" id="copy">Copy JSON</button>
    </div>
    <div class="opts">
      <label><input type="checkbox" id="dedupe" /> Dedupe components</label>
      <label><input type="checkbox" id="expand" /> Expand instances</label>
      <label><input type="checkbox" id="dropIds" checked /> Drop ids</label>
      <label>Modes
        <select id="modes">
          <option value="lightDark" selected>Light + Dark</option>
          <option value="default">Default only</option>
          <option value="all">All</option>
        </select>
      </label>
    </div>
    <div class="hint">
      Select one or more frames — output updates automatically. Exports compact
      <code>nodes</code> (tree + layout/style/colour + bound-variable refs;
      instances as atoms), <code>variables</code> (name-keyed catalog), and
      <code>tokens</code> (W3C/DTCG). Copy the JSON for codegen.
    </div>
    <textarea id="out" spellcheck="false" readonly></textarea>
    <div id="status"></div>

    <script>
      const out = document.getElementById('out');
      const status = (m) => { document.getElementById('status').textContent = m; };

      const getOptions = () => ({
        dedupe: document.getElementById('dedupe').checked,
        expandInstances: document.getElementById('expand').checked,
        dropIds: document.getElementById('dropIds').checked,
        modes: document.getElementById('modes').value,
      });
      const sendOptions = () =>
        parent.postMessage({ pluginMessage: { type: 'options', options: getOptions() } }, '*');

      for (const id of ['dedupe', 'expand', 'dropIds', 'modes']) {
        document.getElementById(id).addEventListener('change', sendOptions);
      }

      onmessage = (e) => {
        const msg = e.data.pluginMessage;
        if (msg && msg.type === 'result') {
          out.value = msg.empty ? '// Select one or more frames, then run again.' : msg.json;
          status('');
        }
      };
      document.getElementById('refresh').onclick = () =>
        parent.postMessage({ pluginMessage: { type: 'export' } }, '*');
      document.getElementById('copy').onclick = async () => {
        out.select();
        try {
          await navigator.clipboard.writeText(out.value);
          status('Copied to clipboard.');
        } catch {
          document.execCommand('copy');
          status('Copied.');
        }
      };
    </script>
  </body>
</html>
